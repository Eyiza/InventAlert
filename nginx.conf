events {
    worker_connections 1024;
}

http {
    upstream identity {
        server identity-service:8081;
    }

    upstream inventory {
        server inventory-service:8082;
    }

    upstream notification {
        server notification-service:8083;
    }

    upstream analytics {
        server analytics-service:8084;
    }

    server {
        listen 80;

        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;

        # ── Identity service ──────────────────────────────────────────────────
        location /api/auth/      { proxy_pass http://identity; }
        location /api/users/     { proxy_pass http://identity; }
        location /api/companies/ { proxy_pass http://identity; }

        # ── Inventory service ─────────────────────────────────────────────────
        location /api/warehouses/      { proxy_pass http://inventory; }
        location /api/products/        { proxy_pass http://inventory; }
        location /api/stock/           { proxy_pass http://inventory; }
        location /api/movements/       { proxy_pass http://inventory; }
        location /api/transfers/       { proxy_pass http://inventory; }
        location /api/reconciliations/ { proxy_pass http://inventory; }
        location /api/alerts/          { proxy_pass http://inventory; }

        # ── Notification service ──────────────────────────────────────────────
        location /api/notifications/ { proxy_pass http://notification; }

        # ── Analytics service ─────────────────────────────────────────────────
        location /api/analytics/ { proxy_pass http://analytics; }

        # WebSocket — Upgrade/Connection headers must be set in this block directly;
        # a location with any proxy_set_header does not inherit the server-level ones.
        location /ws/ {
            proxy_pass            http://notification;
            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_set_header      Upgrade           $http_upgrade;
            proxy_set_header      Connection        "upgrade";
            proxy_read_timeout    3600s;
        }
    }
}
