spring.config.import=optional:classpath:env.properties

# Application
spring.application.name=notificationService
server.port=8083

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Mail (Mailtrap for dev)
spring.mail.host=${SMTP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET:changeme-min-32-chars-for-hmac-sha}

# Notification TTL
notification.ttl-days=${NOTIFICATION_TTL_DAYS:90}

# Mail from address
notification.mail.from=${MAIL_FROM:noreply@inventalert.com}

# Frontend base URL — used to build links in emails (e.g. password reset)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
