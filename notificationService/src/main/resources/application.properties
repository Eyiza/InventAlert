# Application
spring.application.name=notificationService
server.port=8083

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Kafka Consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.inventalert.*

# Mail (Mailtrap for dev)
spring.mail.host=${SMTP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${SMTP_PORT:2525}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=${JWT_SECRET}

# Notification TTL
notification.ttl-days=${NOTIFICATION_TTL_DAYS:90}

# Logging
logging.level.com.inventalert.notificationService=DEBUG
logging.level.org.springframework.security=INFO
