services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  mysql-identity:
    image: mysql:8
    container_name: inventalert-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-inventory.sql:/docker-entrypoint-initdb.d/init-inventory.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inventalert-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: inventalert-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT  — for host-side clients (services running on your machine)
      # INTERNAL   — for container-side clients (services running inside Docker)
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: inventalert-clickhouse
    environment:
      CLICKHOUSE_DB: inventalert_analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./docker/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application services (profile: app) ───────────────────────────────────────
  # Start with:  docker compose --profile app up
  # Infrastructure only: docker compose up

  identity-service:
    profiles: [app]
    build: ./identityService
    container_name: inventalert-identity
    ports:
      - "8081:8081"
    environment:
      # Database — internal Docker network address (not the host-mapped port)
      MYSQL_IDENTITY_HOST: mysql-identity
      MYSQL_IDENTITY_PORT: 3306
      MYSQL_IDENTITY_DB: ${MYSQL_DATABASE}
      MYSQL_IDENTITY_USER: ${MYSQL_IDENTITY_USER}
      MYSQL_IDENTITY_PASSWORD: ${MYSQL_IDENTITY_PASSWORD}
      # Kafka — use INTERNAL listener when inside Docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Security
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_ID: ${SUPER_ADMIN_ID}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql-identity:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    profiles: [app]
    build: ./inventoryService
    container_name: inventalert-inventory
    ports:
      - "8082:8082"
    environment:
      # Both services share the same MySQL instance; inventory uses company_* schemas
      MYSQL_INVENTORY_HOST: mysql-identity
      MYSQL_INVENTORY_PORT: 3306
      MYSQL_INVENTORY_USER: ${MYSQL_INVENTORY_USER}
      MYSQL_INVENTORY_PASSWORD: ${MYSQL_INVENTORY_PASSWORD}
      # Kafka — use INTERNAL listener when inside Docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Security
      JWT_SECRET: ${JWT_SECRET}
      # Optional
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      mysql-identity:
        condition: service_healthy
      kafka:
        condition: service_healthy

  analytics-service:
    profiles: [app]
    build: ./analyticsService
    container_name: inventalert-analytics
    ports:
      - "8084:8084"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_HTTP_PORT: 8123
      CLICKHOUSE_NATIVE_PORT: 9000
      CLICKHOUSE_DB: inventalert_analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    profiles: [app]
    build: ./notificationService
    container_name: inventalert-notification
    ports:
      - "8083:8083"
    environment:
      # Redis — internal Docker network address
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka — use INTERNAL listener when inside Docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Security
      JWT_SECRET: ${JWT_SECRET}
      # Email
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      # App config
      NOTIFICATION_TTL_DAYS: ${NOTIFICATION_TTL_DAYS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  nginx:
    profiles: [app]
    image: nginx:1.25-alpine
    container_name: inventalert-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - identity-service
      - inventory-service
      - notification-service

volumes:
  mysql-data:
  redis-data:
  clickhouse-data:
