# Application
spring.application.name=analyticsService
server.port=8084

# Kafka Consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=analytics-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.inventalert.*

# JWT
jwt.secret=${JWT_SECRET}

# ClickHouse
clickhouse.host=${CLICKHOUSE_HOST:localhost}
clickhouse.http-port=${CLICKHOUSE_HTTP_PORT:8123}
clickhouse.native-port=${CLICKHOUSE_NATIVE_PORT:9000}
clickhouse.database=${CLICKHOUSE_DB:inventalert_analytics}
clickhouse.username=${CLICKHOUSE_USER:analytics_user}
clickhouse.password=${CLICKHOUSE_PASSWORD}

# Logging
logging.level.com.inventalert.analyticsService=DEBUG
logging.level.org.springframework.security=INFO
