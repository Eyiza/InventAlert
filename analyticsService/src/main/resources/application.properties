spring.config.import=optional:classpath:env.properties

# Application
spring.application.name=analyticsService
server.port=8084

# JWT (validate tokens issued by identityService — same secret)
jwt.secret=${JWT_SECRET}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ClickHouse
clickhouse.host=${CLICKHOUSE_HOST:localhost}
clickhouse.http-port=${CLICKHOUSE_HTTP_PORT:8123}
clickhouse.database=${CLICKHOUSE_DB:inventalert_analytics}
clickhouse.username=${CLICKHOUSE_USER:analytics_user}
clickhouse.password=${CLICKHOUSE_PASSWORD}

# Kafka consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=analytics-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Slow down retry attempts when broker is unavailable (reduces log spam during local dev)
spring.kafka.consumer.properties.reconnect.backoff.ms=2000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=10000
spring.kafka.listener.missing-topics-fatal=false

# Disable Spring Boot datasource script initializer (ClickHouse manages its own schema)
spring.sql.init.mode=never

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
