# Test properties — override main application.properties for integration tests.
# Testcontainers @ServiceConnection auto-configures the datasource and Kafka bootstrap servers;
# these properties only need to cover things Testcontainers cannot auto-wire.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Stub credentials so DataSourceProperties binds without failing.
# @ServiceConnection replaces these with the real container credentials at runtime.
spring.datasource.username=test
spring.datasource.password=test

# JWT and SuperAdmin test values
JWT_SECRET=test-secret-key-minimum-32-chars!!
SUPER_ADMIN_EMAIL=superadmin@inventalert.ng
SUPER_ADMIN_PASSWORD=SuperSecure123!
SUPER_ADMIN_ID=superadmin-fixed-uuid-0001

# Kafka auto-config via @ServiceConnection — bootstrap-servers overridden by Testcontainers
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=WARN
