# Application
spring.application.name=identityService
server.port=8081

# Datasource
spring.datasource.url=jdbc:mysql://${MYSQL_IDENTITY_HOST:localhost}:${MYSQL_IDENTITY_PORT:3307}/${MYSQL_IDENTITY_DB:inventalert_identity}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_IDENTITY_USER}
spring.datasource.password=${MYSQL_IDENTITY_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# Logging
logging.level.com.inventalert.identityService=DEBUG
logging.level.org.springframework.security=INFO
