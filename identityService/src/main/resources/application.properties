spring.config.import=optional:classpath:env.properties

# Application
spring.application.name=identityService
server.port=8081

# Datasource
spring.datasource.url=jdbc:mysql://${MYSQL_IDENTITY_HOST:localhost}:${MYSQL_IDENTITY_PORT:3306}/${MYSQL_IDENTITY_DB:inventalert_identity}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

spring.datasource.username=${MYSQL_IDENTITY_USER}
spring.datasource.password=${MYSQL_IDENTITY_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
