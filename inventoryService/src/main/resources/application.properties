spring.application.name=inventoryService
spring.config.import=optional:classpath:env.properties

server.port=8082

# Datasource
spring.datasource.url=jdbc:mysql://${MYSQL_INVENTORY_HOST:localhost}:${MYSQL_INVENTORY_PORT:3308}/?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_INVENTORY_USER}
spring.datasource.password=${MYSQL_INVENTORY_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway disabled programmatic per-company schema
spring.flyway.enabled=false

# Kafka producer and consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=inventory-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Async executor
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20

# Google Maps
google.maps.api-key=${GOOGLE_MAPS_API_KEY:}
google.maps.timeout-seconds=3
google.maps.cache-ttl-hours=24

# Transfer suggestions - skip if nearest surplus warehouse exceeds this driving distance
transfer.max.distance.km=200

# Identity DB name — used for cross-schema lookup of procurement officers
identity.db.name=${IDENTITY_DB_NAME:inventalert_identity}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
server.forward-headers-strategy=framework

# Actuator / Prometheus — runs on a separate port, never exposed via Nginx
management.server.port=8090
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

