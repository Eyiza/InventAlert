# Application
spring.application.name=inventoryService
server.port=8082

# Datasource
spring.datasource.url=jdbc:mysql://${MYSQL_INVENTORY_HOST:localhost}:${MYSQL_INVENTORY_PORT:3308}/${MYSQL_INVENTORY_DB:inventalert_inventory}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_INVENTORY_USER}
spring.datasource.password=${MYSQL_INVENTORY_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Kafka Producer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Kafka Consumer
spring.kafka.consumer.group-id=inventory-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.inventalert.*

# Cache
spring.cache.type=simple

# JWT
jwt.secret=${JWT_SECRET}

# Google Maps
google.maps.api-key=${GOOGLE_MAPS_API_KEY}
google.maps.timeout-seconds=3
google.maps.cache-ttl-hours=24

# Logging
logging.level.com.inventalert.inventoryService=DEBUG
logging.level.org.springframework.security=INFO
