apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: inventalert-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306; do echo waiting for mysql; sleep 3; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done"]
      containers:
        - name: inventory-service
          image: <ECR_URI>/inventalert-inventory-service:latest
          imagePullPolicy: Always
          env:
            - name: MYSQL_INVENTORY_HOST
              value: "mysql"
            - name: MYSQL_INVENTORY_PORT
              value: "3306"
            - name: MYSQL_INVENTORY_USER
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: MYSQL_INVENTORY_USER
            - name: MYSQL_INVENTORY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: MYSQL_INVENTORY_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: JWT_SECRET
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: GOOGLE_MAPS_API_KEY
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: CORS_ALLOWED_ORIGINS
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx512m"
            - name: APP_SEED_DATA
              value: "false"
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: inventalert-prod
spec:
  selector:
    app: inventory-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
