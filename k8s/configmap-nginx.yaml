apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: inventalert-prod
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream identity {
            server identity-service:8081;
        }
        upstream inventory {
            server inventory-service:8082;
        }
        upstream notification {
            server notification-service:8083;
        }
        upstream analytics {
            server analytics-service:8084;
        }

        server {
            listen 80;

            proxy_http_version    1.1;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header      X-Forwarded-Proto $scheme;
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;

            # CORS preflight is handled by each microservice (CORS_ALLOWED_ORIGINS).
            # Do not short-circuit OPTIONS in nginx — empty 204 responses lack Access-Control-* headers.

            location /api/auth/           { proxy_pass http://identity; }
            location /api/users           { proxy_pass http://identity; }
            location /api/companies       { proxy_pass http://identity; }
            location /api/superadmin      { proxy_pass http://identity; }
            location /api/complaints      { proxy_pass http://identity; }

            location /api/warehouses      { proxy_pass http://inventory; }
            location /api/products        { proxy_pass http://inventory; }
            location /api/stock           { proxy_pass http://inventory; }
            location /api/movements       { proxy_pass http://inventory; }
            location /api/transfers       { proxy_pass http://inventory; }
            location /api/reconciliations { proxy_pass http://inventory; }
            location /api/alerts          { proxy_pass http://inventory; }

            location /api/notifications   { proxy_pass http://notification; }
            location /api/analytics       { proxy_pass http://analytics; }

            location /ws {
                proxy_pass            http://notification;
                proxy_http_version    1.1;
                proxy_set_header      Host              $host;
                proxy_set_header      X-Real-IP         $remote_addr;
                proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header      X-Forwarded-Proto $scheme;
                proxy_set_header      Upgrade           $http_upgrade;
                proxy_set_header      Connection        "upgrade";
                proxy_read_timeout    3600s;
            }

            location ~ ^/identity/(swagger-ui|v3/api-docs|webjars) {
                rewrite ^/identity(/.*)$ $1 break;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Prefix /identity;
                proxy_pass http://identity;
            }

            location ~ ^/inventory/(swagger-ui|v3/api-docs|webjars) {
                rewrite ^/inventory(/.*)$ $1 break;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Prefix /inventory;
                proxy_pass http://inventory;
            }

            location ~ ^/notification/(swagger-ui|v3/api-docs|webjars) {
                rewrite ^/notification(/.*)$ $1 break;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Prefix /notification;
                proxy_pass http://notification;
            }

            location ~ ^/analytics/(swagger-ui|v3/api-docs|webjars) {
                rewrite ^/analytics(/.*)$ $1 break;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Prefix /analytics;
                proxy_pass http://analytics;
            }
        }
    }
