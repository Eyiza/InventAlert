apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: inventalert-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306; do echo waiting for mysql; sleep 3; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done"]
      containers:
        - name: identity-service
          image: <ECR_URI>/inventalert-identity-service:latest
          env:
            - name: MYSQL_IDENTITY_HOST
              value: "mysql"
            - name: MYSQL_IDENTITY_PORT
              value: "3306"
            - name: MYSQL_IDENTITY_DB
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: MYSQL_DATABASE
            - name: MYSQL_IDENTITY_USER
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: MYSQL_IDENTITY_USER
            - name: MYSQL_IDENTITY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: MYSQL_IDENTITY_PASSWORD
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: JWT_SECRET
            - name: SUPER_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SUPER_ADMIN_EMAIL
            - name: SUPER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SUPER_ADMIN_PASSWORD
            - name: SUPER_ADMIN_ID
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SUPER_ADMIN_ID
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: CORS_ALLOWED_ORIGINS
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: inventalert-prod
spec:
  selector:
    app: identity-service
  ports:
    - port: 8081
      targetPort: 8081
