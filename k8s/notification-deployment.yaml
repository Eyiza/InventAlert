apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: inventalert-prod
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 3; done"]
        - name: wait-for-kafka
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z kafka 9092; do echo waiting for kafka; sleep 3; done"]
      containers:
        - name: notification-service
          image: <ECR_URI>/inventalert-notification-service:latest
          env:
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: JWT_SECRET
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: SMTP_PASSWORD
            - name: MAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: MAIL_FROM
            - name: NOTIFICATION_TTL_DAYS
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: NOTIFICATION_TTL_DAYS
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: inventalert-secrets
                  key: CORS_ALLOWED_ORIGINS
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx512m"
          ports:
            - containerPort: 8083
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: inventalert-prod
spec:
  selector:
    app: notification-service
  ports:
    - port: 8083
      targetPort: 8083
