apiVersion: v1
kind: Secret
metadata:
  name: inventalert-secrets
  namespace: inventalert-prod
type: Opaque
stringData:
  # JWT
  JWT_SECRET: <REPLACE_ME>

  # MySQL
  MYSQL_ROOT_PASSWORD: <REPLACE_ME>
  MYSQL_DATABASE: <REPLACE_ME>
  MYSQL_IDENTITY_USER: <REPLACE_ME>
  MYSQL_IDENTITY_PASSWORD: <REPLACE_ME>
  MYSQL_INVENTORY_USER: <REPLACE_ME>
  MYSQL_INVENTORY_PASSWORD: <REPLACE_ME>

  # ClickHouse
  CLICKHOUSE_PASSWORD: <REPLACE_ME>

  # SMTP
  SMTP_HOST: <REPLACE_ME>
  SMTP_PORT: "587"
  SMTP_USERNAME: <REPLACE_ME>
  SMTP_PASSWORD: <REPLACE_ME>
  MAIL_FROM: <REPLACE_ME>

  # Super admin seed
  SUPER_ADMIN_EMAIL: <REPLACE_ME>
  SUPER_ADMIN_PASSWORD: <REPLACE_ME>
  SUPER_ADMIN_ID: <REPLACE_ME>

  # App config
  NOTIFICATION_TTL_DAYS: "30"
  CORS_ALLOWED_ORIGINS: <REPLACE_ME>

  # Monitoring
  GRAFANA_PASSWORD: <REPLACE_ME>

  # Optional
  GOOGLE_MAPS_API_KEY: <REPLACE_ME>
